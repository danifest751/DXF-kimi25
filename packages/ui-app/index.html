<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DXF Set Builder</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html, body { background: #0a0e1a; color: #fff; margin: 0; padding: 0; height: 100%; }
    #app { height: 100%; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div id="app">
    <div class="set-builder hidden" id="set-builder-root" aria-hidden="true"></div>
    <div class="progress-bar hidden" id="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      <span class="progress-label" id="progress-label"></span>
    </div>
    <div class="drop-overlay" id="drop-overlay">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>Перетащите DXF файл сюда</span>
    </div>
  </div>

  <!-- Delete catalog modal (used by set-builder) -->
  <div class="modal-overlay hidden" id="delete-catalog-modal">
    <div class="modal-card">
      <h3><span data-i18n="modal.deleteCatalog.title">Удалить каталог</span> «<span id="dcm-name"></span>»?</h3>
      <p data-i18n="modal.deleteCatalog.question">Выберите, что сделать с файлами:</p>
      <button class="modal-btn" id="dcm-move" data-i18n="modal.deleteCatalog.move">Перенести в «Без каталога»</button>
      <button class="modal-btn danger" id="dcm-delete" data-i18n="modal.deleteCatalog.delete">Удалить вместе с файлами</button>
      <button class="modal-btn ghost" id="dcm-cancel" data-i18n="modal.deleteCatalog.cancel">Отмена</button>
    </div>
  </div>

  <button id="btn-set-builder" style="display:none" aria-hidden="true"></button>
  <input type="file" id="file-input" accept=".dxf" multiple style="display:none" />
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
