<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DXF Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* ═══════════════════════════════════════════════════════════════════
       НОВАЯ ЦВЕТОВАЯ СХЕМА - Modern Dark Pro
       ═══════════════════════════════════════════════════════════════════ */
    :root {
      /* Фон */
      --bg-primary: #0a0e1a;
      --bg-secondary: #121826;
      --bg-tertiary: #1a2236;
      --bg-hover: #232d45;
      --bg-active: #2d3a5a;
      --bg-overlay: rgba(10, 14, 26, 0.85);
      
      /* Акценты */
      --accent-primary: #00d4ff;
      --accent-secondary: #7b2cbf;
      --accent-success: #00ff9d;
      --accent-warning: #ffaa00;
      --accent-danger: #ff4757;
      --accent-info: #00d4ff;
      
      /* Акценты с эффектами */
      --accent-glow: rgba(0, 212, 255, 0.15);
      --success-glow: rgba(0, 255, 157, 0.15);
      --danger-glow: rgba(255, 71, 87, 0.15);
      
      /* Текст */
      --text-primary: #ffffff;
      --text-secondary: #a0aec0;
      --text-dim: #718096;
      --text-muted: #4a5568;
      
      /* Границы */
      --border: rgba(255, 255, 255, 0.08);
      --border-light: rgba(255, 255, 255, 0.12);
      --border-accent: rgba(0, 212, 255, 0.3);
      
      /* Тени */
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
      --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.5);
      
      /* Свечение */
      --glow-primary: 0 0 20px rgba(0, 212, 255, 0.3);
      --glow-success: 0 0 20px rgba(0, 255, 157, 0.3);
      --glow-warning: 0 0 20px rgba(255, 170, 0, 0.3);
      
      /* Радиусы */
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 18px;
      --radius-full: 9999px;
      
      /* Переходы */
      --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      
      /* Z-индексы */
      --z-dropdown: 100;
      --z-sticky: 200;
      --z-modal: 300;
      --z-toast: 400;
      --z-tooltip: 500;
      
      /* Шрифты */
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
    }
    
    /* Базовые стили */
    html, body { 
      height: 100%; 
      font-family: var(--font); 
      background: var(--bg-primary); 
      color: var(--text-primary); 
      overflow: hidden; 
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    #app { display: flex; flex-direction: column; height: 100vh; }
    
    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { 
      background: var(--bg-active); 
      border-radius: var(--radius-full);
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-accent); }

    /* ═══════════════════════════════════════════════════════════════════
       TOOLBAR - Modern Design
       ═══════════════════════════════════════════════════════════════════ */
    .toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 0 16px; 
      background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; height: 52px;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow-md);
    }
    
    .toolbar .logo {
      display: flex; align-items: center; gap: 8px;
      font-size: 15px; font-weight: 700; 
      color: var(--accent-primary); 
      letter-spacing: -0.5px;
      margin-right: 12px; white-space: nowrap;
      text-shadow: var(--glow-primary);
    }
    .toolbar .logo span { color: var(--text-secondary); font-weight: 500; }
    
    .tb-btn {
      background: transparent; 
      border: 1px solid var(--border); 
      color: var(--text-secondary);
      padding: 6px 12px; 
      border-radius: var(--radius-sm); 
      cursor: pointer; 
      font-size: 12px;
      font-family: var(--font); 
      font-weight: 500; 
      transition: var(--transition-base);
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }
    
    .tb-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transition: var(--transition-slow);
    }
    
    .tb-btn:hover {
      background: var(--bg-hover); 
      color: var(--text-primary); 
      border-color: var(--border-accent);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    
    .tb-btn:hover::before { left: 100%; }
    
    .tb-btn:active { 
      background: var(--bg-active); 
      transform: translateY(0);
    }
    
    .tb-btn.active { 
      background: var(--accent-glow); 
      border-color: var(--accent-primary); 
      color: var(--accent-primary);
      box-shadow: var(--glow-primary);
    }
    
    .tb-btn svg { 
      width: 15px; height: 15px; 
      stroke: currentColor; 
      fill: none; 
      stroke-width: 2; 
      stroke-linecap: round; 
      stroke-linejoin: round;
      transition: var(--transition-fast);
    }
    
    .tb-btn:hover svg { transform: scale(1.05); }
    
    .tb-sep { 
      width: 1px; 
      height: 24px; 
      background: var(--border); 
      margin: 0 4px; 
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════════════════════════════
       CUTTING BADGE - Neon Style
       ═══════════════════════════════════════════════════════════════════ */
    .cut-badge {
      display: none; align-items: center; gap: 16px; margin-left: 8px;
      background: var(--bg-tertiary); 
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 6px 16px; 
      height: 36px;
      box-shadow: var(--shadow-sm);
      transition: var(--transition-base);
    }
    .cut-badge.visible { display: flex; }
    .cut-badge:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--border-accent);
    }
    .cut-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
    .cut-item svg { width: 14px; height: 14px; stroke: var(--accent-success); fill: none; stroke-width: 2.2; filter: drop-shadow(0 0 4px rgba(0,255,157,0.5)); }
    .cut-val { 
      font-family: var(--mono); 
      font-weight: 700; 
      font-size: 14px; 
      color: var(--accent-success);
      text-shadow: 0 0 8px rgba(0,255,157,0.4);
    }
    .cut-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border); }

    /* ═══════════════════════════════════════════════════════════════════
       PIERCE TOGGLE - Neon Switch
       ═══════════════════════════════════════════════════════════════════ */
    .pierce-toggle {
      display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary);
      cursor: pointer; user-select: none; padding: 6px 10px; border-radius: var(--radius-sm);
      border: 1px solid transparent; transition: var(--transition-base);
    }
    .pierce-toggle:hover { background: var(--bg-hover); }
    .pierce-toggle.on { 
      background: rgba(0, 255, 157, 0.1); 
      color: var(--accent-success); 
      border-color: rgba(0, 255, 157, 0.3);
      box-shadow: 0 0 12px rgba(0, 255, 157, 0.2);
    }
    .pierce-toggle input { display: none; }
    .pierce-dot { 
      width: 10px; height: 10px; 
      border-radius: 50%; 
      border: 2px solid var(--text-muted); 
      transition: var(--transition-base);
    }
    .pierce-toggle.on .pierce-dot { 
      background: var(--accent-success); 
      border-color: var(--accent-success); 
      box-shadow: 0 0 10px var(--accent-success), 0 0 20px rgba(0,255,157,0.5);
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .tb-spacer { flex: 1; }
    .tb-filename {
      font-size: 12px; color: var(--text-muted); font-family: var(--mono); font-weight: 400;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px;
    }
    .tb-stats { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }

    /* ═══════════════════════════════════════════════════════════════════
       MAIN AREA
       ═══════════════════════════════════════════════════════════════════ */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ═══════════════════════════════════════════════════════════════════
       SIDEBAR - Glassmorphism Panel
       ═══════════════════════════════════════════════════════════════════ */
    .sidebar {
      width: 240px; min-width: 200px; 
      background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
      border-right: 1px solid var(--border); 
      display: flex; flex-direction: column;
      overflow: hidden; flex-shrink: 0;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow-sm);
    }
    .sidebar.hidden { display: none; }
    .sidebar-header {
      padding: 12px 16px; 
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      color: var(--text-muted); 
      border-bottom: 1px solid var(--border); 
      letter-spacing: 1.2px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0, 0, 0, 0.2);
    }
    .sidebar-add-btn {
      background: transparent; 
      border: 1px solid var(--border); 
      color: var(--text-secondary);
      width: 24px; height: 24px; 
      border-radius: var(--radius-sm); 
      cursor: pointer; 
      display: flex;
      align-items: center; justify-content: center; 
      transition: var(--transition-base);
    }
    .sidebar-add-btn:hover { 
      background: var(--bg-hover); 
      color: var(--accent-primary); 
      border-color: var(--accent-primary);
      box-shadow: var(--glow-primary);
    }

    .file-list { flex: 1; overflow-y: auto; padding: 8px; }
    .file-list::-webkit-scrollbar { width: 4px; }
    .file-list::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: var(--radius-full); }
    .file-list-empty {
      padding: 32px 16px; text-align: center; font-size: 12px; color: var(--text-muted);
    }
    .file-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 10px;
      cursor: pointer; font-size: 12px; transition: var(--transition-base); 
      border-radius: var(--radius-md);
      color: var(--text-secondary); position: relative;
      margin-bottom: 4px;
    }
    .file-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent-primary);
      border-radius: var(--radius-sm) 0 0 var(--radius-sm);
      opacity: 0;
      transition: var(--transition-base);
    }
    .file-item:hover { 
      background: var(--bg-hover); 
      color: var(--text-primary);
      transform: translateX(2px);
    }
    .file-item.active { 
      background: var(--bg-active); 
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }
    .file-item.active::before { opacity: 1; }
    .file-item input[type=checkbox] {
      accent-color: var(--accent-primary); cursor: pointer; flex-shrink: 0;
      width: 16px; height: 16px;
    }
    .file-item-icon {
      width: 16px; height: 16px; color: var(--accent-primary); flex-shrink: 0;
      filter: drop-shadow(0 0 4px rgba(0,212,255,0.4));
    }
    .file-item-name {
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500;
    }
    .file-item-info {
      font-size: 10px; color: var(--text-muted); font-family: var(--mono); white-space: nowrap;
    }
    .file-item-remove {
      opacity: 0; width: 16px; height: 16px; background: transparent; border: none;
      color: var(--red); cursor: pointer; display: flex; align-items: center;
      justify-content: center; border-radius: 3px; transition: all 0.15s; flex-shrink: 0;
    }
    .file-item:hover .file-item-remove { opacity: 0.6; }
    .file-item-remove:hover { opacity: 1 !important; background: rgba(239,68,68,0.15); }

    /* ─── Canvas area ─── */
    .canvas-container { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
    .canvas-container canvas { display: block; width: 100%; height: 100%; }

    /* ─── Inspector ─── */
    .inspector {
      width: 280px; min-width: 220px; background: var(--bg-panel);
      border-left: 1px solid var(--border); overflow-y: auto; flex-shrink: 0;
    }
    .inspector.hidden { display: none; }
    .inspector::-webkit-scrollbar { width: 4px; }
    .inspector::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 2px; }
    .inspector-header {
      padding: 10px 14px; font-size: 11px; font-weight: 600; text-transform: uppercase;
      color: var(--text-muted); border-bottom: 1px solid var(--border); letter-spacing: 0.8px;
    }
    .inspector-content { padding: 10px 14px; }
    .prop-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
    .prop-label { color: var(--text-dim); font-weight: 500; }
    .prop-value { color: var(--text); font-family: var(--mono); font-size: 11px; text-align: right; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }

    /* ═══════════════════════════════════════════════════════════════════
       NESTING PANEL - Modern Cards
       ═══════════════════════════════════════════════════════════════════ */
    .nesting-panel {
      width: 300px; min-width: 260px; 
      background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
      border-left: 1px solid var(--border); 
      overflow-y: auto; flex-shrink: 0;
      display: flex; flex-direction: column;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow-sm);
    }
    .nesting-panel.hidden { display: none; }
    .nesting-panel::-webkit-scrollbar { width: 6px; }
    .nesting-panel::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: var(--radius-full); }
    .np-header {
      padding: 14px 16px; 
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      color: var(--text-muted); 
      border-bottom: 1px solid var(--border); 
      letter-spacing: 1.2px;
      background: rgba(0, 0, 0, 0.2);
    }
    .np-section { 
      padding: 14px 16px; 
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
    }
    .np-label { 
      font-size: 10px; font-weight: 700; 
      color: var(--text-muted); 
      margin-bottom: 8px; 
      text-transform: uppercase; 
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .np-label::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--accent-primary);
      border-radius: 2px;
      box-shadow: 0 0 8px var(--accent-primary);
    }
    .np-select {
      width: 100%; 
      background: var(--bg-tertiary); 
      border: 1px solid var(--border);
      color: var(--text-primary); 
      padding: 8px 10px; 
      border-radius: var(--radius-sm); 
      font-size: 12px;
      font-family: var(--font); 
      cursor: pointer; 
      outline: none;
      transition: var(--transition-base);
    }
    .np-select:focus { 
      border-color: var(--accent-primary); 
      box-shadow: 0 0 0 2px var(--accent-glow);
    }
    .np-select option { background: var(--bg-secondary); color: var(--text-primary); }
    .np-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .np-input {
      flex: 1; 
      background: var(--bg-tertiary); 
      border: 1px solid var(--border);
      color: var(--text-primary); 
      padding: 6px 8px; 
      border-radius: var(--radius-sm); 
      font-size: 12px;
      font-family: var(--mono); 
      outline: none; 
      width: 0;
      transition: var(--transition-base);
    }
    .np-input:focus { 
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }
    .np-input-sm { max-width: 70px; }
    .np-x { color: var(--text-muted); font-size: 12px; font-weight: 700; }
    .np-unit { color: var(--text-muted); font-size: 11px; white-space: nowrap; }
    .np-items { display: flex; flex-direction: column; gap: 6px; }
    .np-items-empty { font-size: 12px; color: var(--text-muted); padding: 16px 0; text-align: center; }
    .np-item-row {
      display: flex; align-items: center; gap: 8px; 
      padding: 8px 10px; 
      font-size: 12px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: var(--transition-base);
    }
    .np-item-row:hover {
      border-color: var(--border-accent);
      background: var(--bg-hover);
    }
    .np-item-name { flex: 1; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .np-item-size { color: var(--text-muted); font-family: var(--mono); font-size: 10px; white-space: nowrap; background: var(--bg-active); padding: 2px 6px; border-radius: var(--radius-sm); }
    .np-item-qty {
      width: 50px; 
      background: var(--bg-secondary); 
      border: 1px solid var(--border);
      color: var(--text-primary); 
      padding: 4px 6px; 
      border-radius: var(--radius-sm); 
      font-size: 12px;
      font-family: var(--mono); 
      text-align: center; 
      outline: none;
      transition: var(--transition-base);
    }
    .np-item-qty:focus { 
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }
    .np-qty-btn {
      background: var(--bg-secondary); 
      border: 1px solid var(--border); 
      color: var(--text-secondary);
      padding: 4px 8px; 
      border-radius: var(--radius-sm); 
      font-size: 10px; 
      font-family: var(--mono);
      cursor: pointer; 
      transition: var(--transition-base); 
      white-space: nowrap; 
      flex-shrink: 0;
      font-weight: 600;
    }
    .np-qty-btn:hover { 
      background: var(--bg-hover); 
      color: var(--accent-primary);
      border-color: var(--accent-primary);
    }
    .np-qty-rst {
      background: transparent; 
      border: 1px solid transparent; 
      color: var(--text-muted);
      padding: 4px 6px; 
      border-radius: var(--radius-sm); 
      font-size: 12px; 
      cursor: pointer;
      transition: var(--transition-base); 
      flex-shrink: 0; 
      line-height: 1;
      font-weight: 700;
    }
    .np-qty-rst:hover { 
      color: var(--accent-primary); 
      border-color: var(--border-accent);
      transform: rotate(90deg);
    }
    .np-run-btn {
      margin: 16px; 
      padding: 10px 20px; 
      background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
      color: white;
      border: none; 
      border-radius: var(--radius-md); 
      font-size: 13px; 
      font-weight: 700;
      font-family: var(--font); 
      cursor: pointer; 
      transition: var(--transition-base);
      box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .np-run-btn:hover { 
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
    }
    .np-run-btn:active { 
      transform: translateY(0);
    }
    .np-results { padding: 16px; }
    .np-result-cards { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 10px; 
      margin-bottom: 12px;
    }
    .np-card {
      flex: 1; 
      background: var(--bg-tertiary); 
      border: 1px solid var(--border);
      border-radius: var(--radius-md); 
      padding: 12px; 
      text-align: center;
      transition: var(--transition-base);
      position: relative;
      overflow: hidden;
    }
    .np-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-success));
      opacity: 0.5;
    }
    .np-card:hover {
      border-color: var(--border-accent);
      box-shadow: var(--shadow-md);
    }
    .np-card-val { 
      font-size: 22px; 
      font-weight: 700; 
      font-family: var(--mono); 
      background: linear-gradient(135deg, var(--accent-success), var(--accent-primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .np-card-label { 
      font-size: 9px; 
      color: var(--text-muted); 
      margin-top: 4px; 
      text-transform: uppercase; 
      letter-spacing: 0.8px;
      font-weight: 600;
    }
    .np-result-summary { 
      font-size: 12px; 
      color: var(--text-secondary); 
      margin-bottom: 12px;
      text-align: center;
      font-weight: 500;
    }
    .np-export-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .np-nav-btn {
      background: var(--bg-card); border: 1px solid var(--border-light); color: var(--text-dim);
      width: 28px; height: 28px; border-radius: var(--radius-sm); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
      transition: all 0.15s;
    }
    .np-nav-btn:hover { background: var(--bg-hover); color: var(--text); }
    #nest-sheet-label { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }

    /* ─── Nesting canvas overlay ─── */
    #nesting-scroll {
      position: absolute; inset: 0; z-index: 10;
      display: none; background: var(--bg); overflow-y: auto; overflow-x: hidden;
    }
    #nesting-scroll.visible { display: block; }
    #nesting-scroll::-webkit-scrollbar { width: 6px; }
    #nesting-scroll::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 3px; }
    #nesting-canvas { display: block; }
    .nest-close {
      position: sticky; top: 8px; float: right; margin: 8px 12px 0 0; z-index: 11;
      background: var(--bg-card); border: 1px solid var(--border-light); color: var(--text-dim);
      width: 32px; height: 32px; border-radius: var(--radius); cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .nest-close:hover { background: var(--bg-hover); color: var(--text); }
    .nest-close svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
    .nest-zoom-popup {
      position: fixed; z-index: 200;
      background: var(--bg); border: 1px solid var(--border-light);
      border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      padding: 8px; display: none;
    }
    .nest-zoom-popup.visible { display: block; }
    .nest-zoom-popup canvas { display: block; border-radius: 4px; cursor: grab; }
    .nest-zoom-popup canvas:active { cursor: grabbing; }
    .nest-zoom-label {
      font-size: 11px; color: var(--text-dim); font-family: var(--mono);
      text-align: center; margin-top: 4px; user-select: none;
    }

    /* ─── Drop overlay ─── */
    .drop-overlay {
      position: absolute; inset: 0; background: rgba(99,102,241,0.08);
      border: 2px dashed var(--accent); border-radius: 12px; margin: 12px;
      display: none; z-index: 100; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 500; color: var(--accent-hover); backdrop-filter: blur(4px);
    }
    .drop-overlay.active { display: flex; }

    /* ─── Welcome ─── */
    .welcome {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px; color: var(--text-dim);
    }
    .welcome.hidden { display: none; }
    .welcome-icon { width: 64px; height: 64px; color: var(--text-muted); opacity: 0.4; }
    .welcome h2 { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; }
    .welcome p { font-size: 13px; color: var(--text-dim); }
    .welcome button {
      background: var(--accent); color: white; border: none; padding: 10px 32px;
      border-radius: var(--radius); font-size: 13px; font-weight: 600; font-family: var(--font);
      cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 12px rgba(99,102,241,0.3);
    }
    .welcome button:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,0.4); }
    .welcome-hint { font-size: 11px; color: var(--text-muted); margin-top: -8px; }

    /* ─── Progress ─── */
    .progress-bar { position: absolute; top: 0; left: 0; right: 0; height: 22px; z-index: 50; display: flex; align-items: center; }
    .progress-bar.hidden { display: none; }
    .progress-fill { position: absolute; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--cyan)); transition: width 0.2s; border-radius: 0 1px 1px 0; }
    .progress-label {
      position: relative; z-index: 1; padding: 0 12px; font-size: 11px;
      color: var(--accent-hover); font-family: var(--mono); white-space: nowrap;
    }

    /* ═══════════════════════════════════════════════════════════════════
       STATUS BAR - Neon Dividers
       ═══════════════════════════════════════════════════════════════════ */
    .statusbar {
      display: flex; align-items: center; gap: 20px;
      padding: 0 16px; 
      background: linear-gradient(180deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-muted); 
      flex-shrink: 0; height: 28px;
      font-family: var(--mono);
      box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.2);
    }
    .statusbar span { 
      white-space: nowrap; 
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .statusbar span::before {
      content: '●';
      font-size: 6px;
      color: var(--border);
    }
    .statusbar span:first-child::before {
      display: none;
    }
    .sb-accent { 
      color: var(--accent-success);
      text-shadow: 0 0 6px rgba(0, 255, 157, 0.4);
    }
    .sb-accent::after {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent-success);
      border-radius: 50%;
      margin-left: 4px;
      box-shadow: 0 0 8px var(--accent-success);
      animation: pulse 2s infinite;
    }

    /* ═══════════════════════════════════════════════════════════════════
       TOAST NOTIFICATIONS
       ═══════════════════════════════════════════════════════════════════ */
    .toast-container {
      position: fixed;
      bottom: 40px;
      right: 20px;
      z-index: var(--z-toast);
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    
    .toast {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      min-width: 280px;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
      animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      position: relative;
    }
    
    .toast::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
    }
    
    .toast.success::before { background: var(--accent-success); }
    .toast.error::before { background: var(--accent-danger); }
    .toast.warning::before { background: var(--accent-warning); }
    .toast.info::before { background: var(--accent-primary); }
    
    .toast-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    
    .toast.success .toast-icon { color: var(--accent-success); }
    .toast.error .toast-icon { color: var(--accent-danger); }
    .toast.warning .toast-icon { color: var(--accent-warning); }
    .toast.info .toast-icon { color: var(--accent-primary); }
    
    .toast-content {
      flex: 1;
      min-width: 0;
    }
    
    .toast-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    
    .toast-message {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .toast-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: var(--radius-sm);
      transition: var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .toast-close:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }
    
    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(100%);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    @keyframes slideOutRight {
      from {
        opacity: 1;
        transform: translateX(0);
      }
      to {
        opacity: 0;
        transform: translateX(100%);
      }
    }
    
    .toast.hiding {
      animation: slideOutRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* ─── Адаптивность ─── */

    /* Планшеты и маленькие ноутбуки */
    @media (max-width: 1024px) {
      .sidebar { width: 200px; min-width: 160px; }
      .inspector { width: 240px; min-width: 180px; }
      .nesting-panel { width: 240px; min-width: 200px; }
      .tb-btn span, .tb-btn:not(#btn-open):not(#btn-fit) { font-size: 0; gap: 0; }
      .tb-btn svg { font-size: initial; }
      .pierce-toggle { font-size: 0; gap: 0; padding: 5px 6px; }
      .pierce-toggle .pierce-dot { font-size: initial; }
      .cut-badge { gap: 8px; padding: 4px 10px; }
      .statusbar { gap: 10px; padding: 0 8px; font-size: 10px; }
    }

    /* Узкие экраны — sidebar по умолчанию скрыт */
    @media (max-width: 768px) {
      .sidebar { position: absolute; left: 0; top: 0; bottom: 0; z-index: 30;
        width: 260px; box-shadow: 4px 0 24px rgba(0,0,0,0.5); transform: translateX(-100%);
        transition: transform 0.25s ease; }
      .sidebar.mobile-open { transform: translateX(0); }
      .sidebar.hidden { display: flex; transform: translateX(-100%); }
      .inspector { position: absolute; right: 0; top: 0; bottom: 0; z-index: 30;
        width: 280px; box-shadow: -4px 0 24px rgba(0,0,0,0.5); transform: translateX(100%);
        transition: transform 0.25s ease; }
      .inspector.mobile-open { transform: translateX(0); display: flex; flex-direction: column; }
      .inspector.hidden { transform: translateX(100%); }
      .nesting-panel { position: absolute; right: 0; top: 0; bottom: 0; z-index: 30;
        width: 280px; box-shadow: -4px 0 24px rgba(0,0,0,0.5); transform: translateX(100%);
        transition: transform 0.25s ease; }
      .nesting-panel.mobile-open { transform: translateX(0); display: flex; }
      .nesting-panel.hidden { transform: translateX(100%); }
      .toolbar { gap: 4px; padding: 0 8px; height: 42px; flex-wrap: nowrap; overflow-x: auto; }
      .toolbar::-webkit-scrollbar { display: none; }
      .toolbar .logo { font-size: 13px; margin-right: 4px; }
      .tb-btn { padding: 5px 7px; font-size: 0; gap: 0; }
      .tb-btn svg { width: 16px; height: 16px; }
      .tb-sep { margin: 0 2px; height: 18px; }
      .pierce-toggle { font-size: 0; gap: 0; padding: 5px 6px; }
      .cut-badge { gap: 6px; padding: 3px 8px; height: 28px; }
      .cut-val { font-size: 11px; }
      .statusbar { gap: 8px; padding: 0 6px; height: 22px; font-size: 10px; overflow-x: auto; }
      .statusbar::-webkit-scrollbar { display: none; }
      .welcome h2 { font-size: 18px; }
      .welcome p { font-size: 12px; }
      .welcome button { padding: 8px 24px; font-size: 12px; }
    }

    /* Мобильные */
    @media (max-width: 480px) {
      .toolbar { height: 40px; gap: 3px; padding: 0 6px; }
      .toolbar .logo span { display: none; }
      .cut-badge { display: none !important; }
      .tb-sep:nth-of-type(n+3) { display: none; }
      .statusbar { height: 20px; font-size: 9px; gap: 6px; }
      #status-version, #status-entities { display: none; }
      .welcome { padding: 0 20px; }
      .welcome-icon { width: 48px; height: 48px; }
      .welcome h2 { font-size: 16px; }
    }

    /* Мобильный оверлей для закрытия панелей */
    .mobile-backdrop {
      display: none; position: fixed; inset: 0; z-index: 25;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(2px);
    }
    .mobile-backdrop.active { display: block; }
  </style>
</head>
<body>
  <div class="mobile-backdrop" id="mobile-backdrop"></div>
  <div id="app">
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="logo">DXF<span>viewer</span></div>
      <div class="tb-sep"></div>

      <button class="tb-btn" id="btn-open" title="Открыть файл (Ctrl+O)">
        <svg viewBox="0 0 24 24"><path d="M5 19a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4l2 2h4a2 2 0 0 1 2 2v1"/><path d="M20 19H9a2 2 0 0 1-2-2l1.5-6A2 2 0 0 1 10.5 9H21l-2 8a2 2 0 0 1-2 2z"/></svg>
        Открыть
      </button>
      <button class="tb-btn" id="btn-fit" title="Вписать в экран (F)">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/></svg>
        Вписать
      </button>

      <div class="tb-sep"></div>

      <button class="tb-btn" id="btn-inspector" title="Инспектор свойств">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        Свойства
      </button>
      <button class="tb-btn" id="btn-nesting" title="Раскладка на лист">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1" fill="none"/><rect x="5" y="5" width="6" height="8" rx="0.5" fill="none"/><rect x="13" y="5" width="6" height="5" rx="0.5" fill="none"/><rect x="5" y="15" width="4" height="4" rx="0.5" fill="none"/><rect x="13" y="12" width="6" height="7" rx="0.5" fill="none"/></svg>
        Раскладка
      </button>
      <button class="tb-btn" id="btn-export" title="Экспорт результатов" style="display:none;">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Экспорт
      </button>
      <button class="tb-btn" id="btn-grid" title="Сетка (G)">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>

      <div class="tb-sep"></div>

      <label class="pierce-toggle" id="pierce-toggle" title="Показать точки врезки">
        <input type="checkbox" id="chk-pierces" />
        <span class="pierce-dot"></span>
        Врезки
      </label>

      <!-- Cutting info badge -->
      <div class="cut-badge" id="cutting-info">
        <div class="cut-item">
          <svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
          <span class="cut-val" id="ci-pierces">0</span>
        </div>
        <div class="cut-dot"></div>
        <div class="cut-item">
          <svg viewBox="0 0 24 24"><path d="M2 12h20"/><path d="M6 8l-4 4 4 4"/><path d="M18 8l4 4-4 4"/></svg>
          <span class="cut-val" id="ci-length">0</span>
        </div>
      </div>

      <div class="tb-spacer"></div>
      <span class="tb-stats" id="stats"></span>
    </div>

    <!-- Main -->
    <div class="main">
      <!-- Sidebar: Files -->
      <div class="sidebar" id="sidebar-files">
        <div class="sidebar-header">
          <span>Файлы</span>
          <button class="sidebar-add-btn" id="btn-add-files" title="Добавить файлы">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div class="file-list" id="file-list">
          <div class="file-list-empty" id="file-list-empty">Нет файлов</div>
        </div>
      </div>

      <!-- Canvas -->
      <div class="canvas-container" id="canvas-container">
        <canvas id="dxf-canvas"></canvas>
        <div id="nesting-scroll">
          <button class="nest-close" id="nest-close" title="Закрыть раскладку">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <canvas id="nesting-canvas"></canvas>
        </div>
        <div class="nest-zoom-popup" id="nest-zoom-popup">
          <canvas id="nest-zoom-canvas"></canvas>
          <div class="nest-zoom-label" id="nest-zoom-label"></div>
        </div>
        <div class="drop-overlay" id="drop-overlay">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Перетащите DXF файл сюда
        </div>
        <div class="welcome" id="welcome">
          <svg class="welcome-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
          <h2>DXF Viewer</h2>
          <p>Просмотр чертежей с анализом лазерной резки</p>
          <button id="btn-welcome-open">Открыть файл</button>
          <span class="welcome-hint">или перетащите .dxf в окно</span>
        </div>
        <div class="progress-bar hidden" id="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
          <span class="progress-label" id="progress-label"></span>
        </div>
      </div>

      <!-- Inspector -->
      <div class="inspector hidden" id="sidebar-inspector">
        <div class="inspector-header">Свойства</div>
        <div class="inspector-content" id="inspector-content">
          <p style="color: var(--text-muted); font-size: 12px;">Кликните на объект</p>
        </div>
      </div>

      <!-- Nesting panel -->
      <div class="nesting-panel hidden" id="nesting-panel">
        <div class="np-header">Раскладка</div>

        <div class="np-section">
          <div class="np-label">Лист металла</div>
          <select class="np-select" id="nest-preset">
            <option value="0">1000 × 2000</option>
            <option value="1" selected>1250 × 2500</option>
            <option value="2">1500 × 3000</option>
            <option value="3">1500 × 6000</option>
            <option value="4">2000 × 6000</option>
            <option value="custom">Свой размер...</option>
          </select>
          <div class="np-row np-custom-size hidden" id="nest-custom-row">
            <input type="number" class="np-input" id="nest-w" placeholder="Ширина" min="1" value="1250" />
            <span class="np-x">×</span>
            <input type="number" class="np-input" id="nest-h" placeholder="Высота" min="1" value="2500" />
            <span class="np-unit">мм</span>
          </div>
        </div>

        <div class="np-section">
          <div class="np-label">Зазор между деталями</div>
          <div class="np-row">
            <input type="number" class="np-input np-input-sm" id="nest-gap" min="0" value="5" step="1" />
            <span class="np-unit">мм</span>
          </div>
        </div>

        <div class="np-section">
          <div class="np-label">Детали и количество</div>
          <div id="nest-items" class="np-items"></div>
          <div class="np-items-empty" id="nest-items-empty">Отметьте файлы в списке</div>
        </div>

        <button class="np-run-btn" id="btn-nest-run">Разложить</button>

        <div class="np-results hidden" id="nest-results">
          <div class="np-label">Результат</div>
          <div class="np-result-cards" id="nest-result-cards"></div>
          <div class="np-result-summary" id="nest-result-summary"></div>
          <div class="np-row" style="margin-top: 12px; gap: 8px;">
            <button class="tb-btn" id="btn-export-dxf" style="flex: 1;">
              <svg viewBox="0 0 24 24" style="width: 14px; height: 14px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              DXF
            </button>
            <button class="tb-btn" id="btn-export-csv" style="flex: 1;">
              <svg viewBox="0 0 24 24" style="width: 14px; height: 14px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              CSV
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Statusbar -->
    <div class="statusbar">
      <span id="status-coords">X: 0.00 &nbsp; Y: 0.00</span>
      <span id="status-zoom">100%</span>
      <span id="status-entities"></span>
      <span class="sb-accent" id="status-pierces"></span>
      <span class="sb-accent" id="status-cutlength"></span>
      <span style="margin-left:auto" id="status-version"></span>
    </div>
  </div>

  <input type="file" id="file-input" accept=".dxf" multiple style="display:none" />
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
